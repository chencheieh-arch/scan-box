<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <title>分箱掃描 超強效穩定版</title>
    <style>
        * {box-sizing: border-box;}
        body {font-family: Arial; background: #f2f2f2; margin: 0; padding: 10px;}
        .container {width: 100%; max-width: 500px; margin: auto; background: white; padding: 15px; border-radius: 12px; box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);}
        h2 {text-align: center; font-size: 24px; margin: 10px 0 15px 0;}
        .box {font-size: 22px; color: #007BFF; text-align: center; margin-bottom: 10px; font-weight: bold;}
        .stats {display: flex; justify-content: space-between; font-size: 16px; margin-bottom: 10px;}
        .stat {background: #f7f7f7; padding: 8px; border-radius: 6px; flex: 1; text-align: center; margin: 2px;}
        input {width: 100%; padding: 20px; font-size: 24px; margin: 10px 0; text-align: center; border-radius: 8px; border: 1px solid #ccc;}
        input:focus {outline: none; border: 2px solid #007BFF;}
        .log {font-size: 14px; margin-top: 10px; height: 140px; overflow: auto; background: #f7f7f7; padding: 10px; border-radius: 8px;}
        .unlock {background: #007BFF; color: white; padding: 12px; border-radius: 8px; text-align: center; margin-bottom: 10px; font-size: 16px;}
    </style>
</head>

<body>

    <div class="container">
        <div id="unlock" class="unlock">🔊 點擊畫面啟動語音</div>
        <h2>📦 分箱掃描</h2>
        <div class="box">目前箱號：<span id="box">未設定</span></div>
        <div class="stats">
            <div class="stat">📦總掃描<br><span id="total">0</span></div>
            <div class="stat">📦本箱<br><span id="boxcount">0</span></div>
            <div class="stat">📶狀態<br><span id="net">ONLINE</span></div>
        </div>
        <input id="scan" placeholder="掃描箱號或條碼" inputmode="latin" autocapitalize="off" autocorrect="off" spellcheck="false">
        <div class="log" id="log"></div>
    </div>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbwIB-OiN5ixB_p8Bl6WL_t5eJsQ0xBdDcLvgnyQSAxTwl-f9O1LlJfn57rNp0ah_GGCpg/exec"
        
        // 核心資料隊列：不論是在線還是離線，資料先存進這裡
        let queue = JSON.parse(localStorage.getItem("scanQueue") || "[]");
        let currentBox = "", totalCount = 0, boxCount = 0, scannedSet = new Set();
        let isProcessing = false; // 上傳鎖定開關
        const scanInput = document.getElementById("scan");

        const CN = ["零", "一", "二", "三", "四", "五", "六", "七", "八", "九", "十",
            "十一", "十二", "十三", "十四", "十五", "十六", "十七", "十八", "十九", "二十",
            "二十一", "二十二", "二十三", "二十四", "二十五", "二十六", "二十七", "二十八", "二十九", "三十"]

        let audioCtx, voice, speakQueue = [], speaking = false

        function speakNext() {
            if (speaking) return
            if (speakQueue.length === 0) return
            speaking = true
            let text = speakQueue.shift()
            let msg = new SpeechSynthesisUtterance(text)
            msg.voice = voice
            msg.rate = 1.35
            msg.pitch = 1
            msg.volume = 1.0
            msg.onend = function () { speaking = false; speakNext() }
            speechSynthesis.speak(msg)
        }

        function speakNumber(n) {
            let text = CN[n] || n.toString()
            speakQueue.push(text)
            speakNext()
        }

        function okBeep() {
            if (!audioCtx) return
            let osc = audioCtx.createOscillator()
            let gain = audioCtx.createGain()
            osc.frequency.value = 1500
            gain.gain.value = 5.0
            osc.connect(gain)
            gain.connect(audioCtx.destination)
            osc.start()
            gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.15)
        }

        function errorBeep() {
            if (!audioCtx) return
            let osc = audioCtx.createOscillator()
            let gain = audioCtx.createGain()
            osc.frequency.value = 180
            gain.gain.value = 5.0
            osc.connect(gain)
            gain.connect(audioCtx.destination)
            osc.start()
            gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.5)
        }

        document.getElementById("unlock").onclick = function () {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)()
            let voices = speechSynthesis.getVoices()
            voice = voices.find(v => v.lang.includes("zh")) || voices[0]
            document.getElementById("unlock").style.display = "none"
        }

        scanInput.focus()
        scanInput.addEventListener("blur", () => setTimeout(() => scanInput.focus(), 100))
        setInterval(() => { if (document.activeElement !== scanInput) scanInput.focus() }, 500)

        scanInput.addEventListener("keypress", function (e) {
            if (e.key === "Enter") {
                let code = this.value.trim(); this.value = ""
                if (code.startsWith("DECK-") || code.startsWith("ENG-")) {
                    currentBox = code
                    boxCount = 0
                    scannedSet.clear()
                    document.getElementById("box").innerText = currentBox
                    document.getElementById("boxcount").innerText = 0
                    log("📦 切換箱號 " + code)
                    return
                }
                if (!currentBox) { alert("請先掃描箱號"); return }
                if (scannedSet.has(code)) { log("⚠ 重複條碼 " + code); errorBeep(); return }
                
                scannedSet.add(code)
                
                // 1. 加入待傳送隊列
                queue.push({ barcode: code, box: currentBox });
                saveQueue();

                totalCount++; boxCount++
                document.getElementById("total").innerText = totalCount
                document.getElementById("boxcount").innerText = boxCount
                okBeep()
                speakNumber(boxCount)
                log("✔ 掃描 " + code)
                
                // 2. 觸發處理隊列
                processQueue();
            }
        })

        // 儲存隊列到 localStorage 防止關閉視窗遺失
        function saveQueue() {
            localStorage.setItem("scanQueue", JSON.stringify(queue));
        }

        // 核心：負責將隊列中的資料一批一批上傳
        async function processQueue() {
            if (isProcessing || queue.length === 0) return;
            isProcessing = true;

            // 每次處理最多 10 筆，避免請求過大
            let batchSize = Math.min(queue.length, 10);
            let dataToSend = queue.slice(0, batchSize);

            try {
                // 使用 fetch 的並發保護
                const response = await fetch(API, {
                    method: "POST",
                    mode: "no-cors", // 配合 GAS 常用設定
                    headers: { "Content-Type": "text/plain" },
                    body: JSON.stringify(dataToSend)
                });

                // 成功送達後，才從隊列中移除這幾筆
                queue.splice(0, batchSize);
                saveQueue();
                document.getElementById("net").innerText = "ONLINE";
                
                // 如果隊列還有剩，遞迴繼續傳
                isProcessing = false;
                if (queue.length > 0) processQueue();
                
            } catch (e) {
                console.error("傳送錯誤:", e);
                document.getElementById("net").innerText = "OFFLINE";
                isProcessing = false;
                // 失敗了就不再遞迴，等下一次定時觸發
            }
        }

        // 定時檢查隊列（處理離線後恢復連線的情況）
        setInterval(processQueue, 3000);

        function log(t) { document.getElementById("log").innerHTML = t + "<br>" + document.getElementById("log").innerHTML }

    </script>
</body>
</html>
